services:
  - type: web
    name: mediconnect-backend
    env: docker
    region: oregon
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /api/health
    plan: free
